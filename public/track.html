<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackr - Live Tracking</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://0dc8ac37452d44.lhr.life/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@capacitor/core@6/dist/index.js"></script>
    <script src="https://unpkg.com/@capacitor/geolocation@8.1.0/dist/plugin.js"></script>
    <script src="https://unpkg.com/@capacitor-community/background-geolocation@1.2.26/dist/plugin.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body>

    <div class="glass-panel" style="max-width: 400px; text-align: center;">
        <h1>Live Tracking Active</h1>
        <p>Your location is being shared with the Admin securely.</p>

        <div class="tracker-status">
            <div class="status-indicator active" id="indicator"></div>
            <span id="statusText" style="color: var(--accent); font-weight: bold;">Transmitting...</span>
        </div>

        <div style="margin-top: 2rem; color: var(--text-muted); font-size: 0.85rem;" id="logs">
            Waiting for GPS fix...
        </div>

        <div id="stopScanner"
            style="display: none; margin-top: 1rem; width: 100%; max-width: 300px; margin-left: auto; margin-right: auto; border-radius: 12px; overflow: hidden;">
            <div id="reader"></div>
        </div>

        <button onclick="showStopScanner()" class="btn" style="background: var(--danger); margin-top: 2rem;">Scan QR to
            Stop</button>
    </div>

    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            document.getElementById('logs').innerHTML = `<span style="color:red; font-size:12px;">App Error: ${message} (Line: ${lineno})</span>`;
            return true;
        };

        const logs = document.getElementById('logs');
        let socket = null;
        try {
            socket = io("https://0dc8ac37452d44.lhr.life");
        } catch (e) {
            logs.innerHTML = `<span style="color:red;">Socket connection failed. Please check internet.</span>`;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || 'unknown';

        let watchId = null;
        let bgWatcherId = null;

        // Ensure we load Capacitor Plugin properly in global scope
        const cap = window.Capacitor ? window.Capacitor.Plugins : (window.capacitorExports || {});
        const BackgroundGeolocation = cap.BackgroundGeolocation || null;
        const Geolocation = cap.Geolocation || null;

        function emitLocation(lat, lng, type) {
            if (socket) {
                socket.emit('update_location', {
                    userId: userId,
                    lat: lat,
                    lng: lng,
                    timestamp: new Date().toISOString()
                });
            }
            logs.innerHTML = `Lat: ${lat.toFixed(5)} <br> Lng: ${lng.toFixed(5)} <br> Updated: ${new Date().toLocaleTimeString()} (${type})`;
        }

        async function startTracking() {
            logs.innerHTML = "Initializing tracking...";

            try {
                if (Geolocation) {
                    try { await Geolocation.requestPermissions(); } catch (e) { console.log("Perm error", e); }
                }

                if (BackgroundGeolocation) {
                    bgWatcherId = await BackgroundGeolocation.addWatcher(
                        {
                            backgroundMessage: "Tracking your route.",
                            backgroundTitle: "Trackr Active",
                            requestPermissions: true,
                            stale: true,
                            distanceFilter: 0
                        },
                        function callback(location, error) {
                            if (error) {
                                if (error.code === "NOT_AUTHORIZED") {
                                    BackgroundGeolocation.openSettings();
                                }
                                logs.innerHTML = `<span style="color:red;">BG Geo Error: ${error.message}</span>`;
                                return;
                            }
                            emitLocation(location.latitude, location.longitude, "BG");
                        }
                    );
                    logs.innerHTML = "Background tracking active. Waiting for coords...";
                } else {
                    fallbackWebTracking();
                }
            } catch (err) {
                logs.innerHTML = `<span style="color:red;">Init error: ${err.message}. Falling back...</span>`;
                fallbackWebTracking();
            }
        }

        function fallbackWebTracking() {
            logs.innerHTML = "Starting web tracking...";
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        emitLocation(position.coords.latitude, position.coords.longitude, "Web");
                    },
                    (error) => {
                        logs.innerHTML = `<span style="color:#ef4444;">GPS Error: ${error.message}</span>`;
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
            } else {
                logs.innerHTML = "Geolocation not supported.";
            }
        }

        // Wait a slight moment for everything to load properly before tracking
        setTimeout(startTracking, 500);

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (bgWatcherId && BackgroundGeolocation) {
                try { BackgroundGeolocation.removeWatcher({ id: bgWatcherId }); } catch (err) { }
            }

            document.getElementById('indicator').classList.remove('active');
            document.getElementById('indicator').style.background = '#94a3b8';
            document.getElementById('statusText').innerText = 'Stopped';
            document.getElementById('statusText').style.color = '#94a3b8';
            if (socket) socket.disconnect();
            logs.innerHTML = "Location sharing has been stopped.";
        }

        var myQrScanner = null;
        function showStopScanner() {
            try {
                document.getElementById('stopScanner').style.display = 'block';
                if (!myQrScanner) {
                    myQrScanner = new Html5QrcodeScanner(
                        "reader",
                        { fps: 10, qrbox: { width: 250, height: 250 } },
                        false);
                    myQrScanner.render(onScanSuccess, onScanFailure);
                }
            } catch (err) {
                alert("Scanner Error: " + err.message);
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (myQrScanner) {
                myQrScanner.clear();
            }
            document.getElementById('stopScanner').style.display = 'none';
            stopTracking();

            // Wait a moment and then redirect back to login/user page
            setTimeout(() => {
                window.location.href = '/user.html';
            }, 1000);
        }

        function onScanFailure(error) {
            // ignore
        }
    </script>

</body>

</html>
