<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackr - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet Setup for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://0dc8ac37452d44.lhr.life/socket.io/socket.io.js"></script>
</head>

<body>

    <div class="dashboard glass-panel" style="padding: 1rem;">
        <div class="header">
            <h1 style="color: var(--primary);">Admin Live Tracking</h1>
            <button class="btn" style="width: auto;" onclick="logout()">Log Out</button>
        </div>

        <div style="display: flex; gap: 1rem; height: calc(100% - 60px);">
            <!-- Active User Details Sidebar -->
            <div style="width: 300px; background: rgba(30, 41, 59, 0.5); border-radius: 12px; padding: 1rem; border: 1px solid var(--border); overflow-y: auto;"
                id="userPanel">
                <h2 style="font-size: 1.2rem; margin-bottom: 1rem; color: var(--text-main);">Active Users</h2>
                <div id="usersList">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">No active drivers.</p>
                </div>
            </div>

            <!-- Live Map -->
            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('role') !== 'admin') {
            window.location.href = '/index.html';
        }

        // Init map
        const map = L.map('map').setView([13.0827, 80.2707], 12); // Default to Chennai center
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        const bikeIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1986/1986937.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        const socket = io("https://0dc8ac37452d44.lhr.life");
        socket.emit('admin_join');

        const activeMarkers = {}; // Keep robust ref to map markers
        const usersListEl = document.getElementById('usersList');

        function renderUserList(users) {
            if (!users || users.length === 0) {
                usersListEl.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">No active drivers.</p>';
                return;
            }

            usersListEl.innerHTML = '';
            users.forEach(data => {
                const card = document.createElement('div');
                card.className = 'user-card';

                // Limit distance string rendering
                const distanceText = data.distance ? data.distance.toFixed(3) : "0.000";

                card.innerHTML = `
                <h3>${data.userId}</h3>
                <div class="tracker-status" style="margin-top: 5px; text-align: left;"><div class="status-indicator active"></div>Live</div>
                <div class="distance-display" style="font-size: 2rem;">${distanceText} <span style="font-size: 1rem; color: var(--text-muted);">km</span></div>
                <p>Lat: ${data.lat.toFixed(5)}</p>
                <p>Lng: ${data.lng.toFixed(5)}</p>
                <button class="btn" style="margin-top: 10px; padding: 0.5rem;" onclick="focusUser('${data.userId}')">View on Map</button>
            `;
                usersListEl.appendChild(card);

                updateMarker(data);
            });
        }

        function updateMarker(data) {
            if (!activeMarkers[data.userId]) {
                // New user on map
                activeMarkers[data.userId] = L.marker([data.lat, data.lng], { icon: bikeIcon }).addTo(map)
                    .bindPopup(`<b>User:</b> ${data.userId}<br><b>Distance:</b> ${data.distance ? data.distance.toFixed(2) : 0} km`);
                map.setView([data.lat, data.lng], 15);
            } else {
                // Move existing
                activeMarkers[data.userId].setLatLng([data.lat, data.lng]);
                activeMarkers[data.userId].setPopupContent(`<b>User:</b> ${data.userId}<br><b>Distance:</b> ${data.distance ? data.distance.toFixed(2) : 0} km`);
            }
        }

        socket.on('initial_locations', (usersArray) => {
            renderUserList(usersArray);
        });

        socket.on('user_location_update', (userData) => {
            updateMarker(userData);

            // Softly re-request/re-render full list for simplicity here
            // Ideally we only update the individual DOM node.
            socket.emit('admin_join'); // Simple hack to re-fetch the entire array to re-render
        });

        function focusUser(userId) {
            const marker = activeMarkers[userId];
            if (marker) {
                map.flyTo(marker.getLatLng(), 17);
                marker.openPopup();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }
    </script>

</body>

</html>
